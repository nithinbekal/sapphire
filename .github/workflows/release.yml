name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: sapphire-lang
            asset: sapphire-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: sapphire-lang
            asset: sapphire-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: sapphire-lang
            asset: sapphire-macos-aarch64

    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate checksums
        run: sha256sum sapphire-* > checksums.txt

      - name: Extract changelog section
        run: |
          awk "/^## ${GITHUB_REF_NAME}/{found=1; next} found && /^## /{exit} found" CHANGELOG.md | sed '/^---$/d' > release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            sapphire-*
            checksums.txt
          body_path: release_notes.txt

  build-wasm:
    name: Build WASM
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM
        run: |
          wasm-pack build \
            --target web \
            --out-dir wasm-dist \
            --release \
            --features wasm \
            --no-default-features

      - name: Upload WASM to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wasm-dist/sapphire_bg.wasm
            wasm-dist/sapphire.js
